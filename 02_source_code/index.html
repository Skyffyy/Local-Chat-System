<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Chat System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            display: flex;
            height: 100vh;
            background: #1e1e2e;
            color: #cdd6f4;
        }

        .sidebar {
            width: 240px;
            background: #181825;
            display: flex;
            flex-direction: column;
            padding: 16px;
            gap: 16px;
        }

        .sidebar h2 {
            font-size: 14px;
            text-transform: uppercase;
            color: #6c7086;
            letter-spacing: 1px;
        }

        .room-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }

        .room-list li {
            padding: 8px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
        }

        .room-list li:hover { background: #313244; }
        .room-list li.active { background: #45475a; color: #cba6f7; }

        .user-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }

        .user-list li {
            font-size: 13px;
            color: #a6adc8;
            padding: 4px 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .user-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #a6e3a1;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 14px 20px;
            background: #1e1e2e;
            border-bottom: 1px solid #313244;
            font-size: 16px;
            font-weight: bold;
            color: #cba6f7;
        }

        .search-bar {
            padding: 8px 20px;
            border-bottom: 1px solid #313244;
            display: none;
        }

        .search-bar input {
            width: 100%;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #45475a;
            background: #313244;
            color: #cdd6f4;
            font-size: 13px;
            outline: none;
        }

        .search-bar input:focus { border-color: #cba6f7; }

        .messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            background: #313244;
            padding: 10px 14px;
            border-radius: 8px;
            max-width: 70%;
        }

        .message .meta {
            font-size: 11px;
            color: #6c7086;
            margin-bottom: 4px;
        }

        .message .meta span {
            color: #cba6f7;
            font-weight: bold;
        }

        .message p { font-size: 14px; }

        .empty-state {
            text-align: center;
            color: #6c7086;
            margin-top: 40px;
            font-size: 14px;
        }

        .input-area {
            padding: 14px 20px;
            border-top: 1px solid #313244;
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid #45475a;
            background: #313244;
            color: #cdd6f4;
            font-size: 14px;
            outline: none;
        }

        .input-area input:focus { border-color: #cba6f7; }

        .input-area button {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            background: #cba6f7;
            color: #1e1e2e;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }

        .input-area button:hover { background: #b4a0e0; }

        .error { color: #f38ba8; font-size: 13px; padding: 6px 20px; }

        .loading { color: #6c7086; font-size: 13px; padding: 10px 20px; }

        /* Highlight search matches in messages */
        .highlight { background: #f9e2af; color: #1e1e2e; border-radius: 3px; padding: 0 2px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div>
        <h2>Rooms</h2>
        <ul class="room-list" id="roomList">
            <li class="loading">Loading...</li>
        </ul>
    </div>
    <div>
        <h2>Users</h2>
        <ul class="user-list" id="userList">
            <li class="loading">Loading...</li>
        </ul>
    </div>
</div>

<div class="chat-area">
    <div class="chat-header" id="chatHeader">Select a room</div>
    <div class="search-bar" id="searchBar">
        <input type="text" id="searchInput" placeholder="Search messages..." />
    </div>
    <div class="messages" id="messages">
        <div class="empty-state">Select a room to start chatting</div>
    </div>
    <div id="errorMsg" class="error" style="display:none;"></div>
    <div class="input-area">
        <input type="text" id="messageInput" placeholder="Type a message..." disabled />
        <button id="sendBtn" onclick="sendMessage()" disabled>Send</button>
    </div>
</div>

<script>
    const API = "http://localhost:8000";
    let currentRoomId = null;
    let currentRoomName = "";
    // Using user id 1 (admin) for now - no auth system yet
    const CURRENT_USER_ID = 1;

    // Load rooms from API on page start
    async function loadRooms() {
        try {
            const res = await fetch(`${API}/api/rooms`);
            const rooms = await res.json();
            const list = document.getElementById("roomList");

            if (rooms.length === 0) {
                list.innerHTML = '<li style="color:#6c7086">No rooms found</li>';
                return;
            }

            list.innerHTML = "";
            rooms.forEach(room => {
                const li = document.createElement("li");
                li.textContent = "# " + room.name;
                li.onclick = () => selectRoom(room.id, room.name, li);
                list.appendChild(li);
            });
        } catch (err) {
            console.error("Failed to load rooms:", err);
            document.getElementById("roomList").innerHTML = '<li style="color:#f38ba8">Error loading rooms</li>';
        }
    }

    // Load users from API
    async function loadUsers() {
        try {
            const res = await fetch(`${API}/api/users`);
            const users = await res.json();
            const list = document.getElementById("userList");

            list.innerHTML = "";
            users.forEach(user => {
                const li = document.createElement("li");
                li.innerHTML = `<span class="user-dot"></span>${user.username} (${user.role})`;
                list.appendChild(li);
            });
        } catch (err) {
            console.error("Failed to load users:", err);
        }
    }

    // Select a room and load its messages
    async function selectRoom(roomId, roomName, element) {
        currentRoomId = roomId;
        currentRoomName = roomName;

        document.querySelectorAll(".room-list li").forEach(li => li.classList.remove("active"));
        element.classList.add("active");

        document.getElementById("chatHeader").textContent = "# " + roomName;
        document.getElementById("messageInput").disabled = false;
        document.getElementById("sendBtn").disabled = false;
        document.getElementById("searchInput").value = "";

        // Show search bar when a room is selected
        document.getElementById("searchBar").style.display = "block";

        await loadMessages(roomId);
    }

    // Load messages for a room
    async function loadMessages(roomId) {
        const container = document.getElementById("messages");
        container.innerHTML = '<div class="loading">Loading messages...</div>';

        try {
            const res = await fetch(`${API}/api/rooms/${roomId}/messages`);
            const messages = await res.json();

            if (messages.length === 0) {
                container.innerHTML = '<div class="empty-state">No messages yet. Say something!</div>';
                return;
            }

            container.innerHTML = "";
            messages.forEach(msg => {
                const div = document.createElement("div");
                div.className = "message";
                div.innerHTML = `
                    <div class="meta"><span>${msg.username || "Unknown"}</span> · ${new Date(msg.created_at).toLocaleTimeString()}</div>
                    <p>${escapeHtml(msg.message_text)}</p>
                `;
                container.appendChild(div);
            });

            container.scrollTop = container.scrollHeight;
        } catch (err) {
            console.error("Failed to load messages:", err);
            container.innerHTML = '<div class="empty-state" style="color:#f38ba8">Error loading messages</div>';
        }
    }

    // Search messages by keyword
    document.getElementById("searchInput").addEventListener("input", async function() {
        const q = this.value.trim();
        if (!currentRoomId) return;

        if (q === "") {
            // If search is cleared reload all messages
            await loadMessages(currentRoomId);
            return;
        }

        try {
            const res = await fetch(`${API}/api/rooms/${currentRoomId}/messages/search?q=${encodeURIComponent(q)}`);
            const messages = await res.json();
            const container = document.getElementById("messages");

            if (messages.length === 0) {
                container.innerHTML = '<div class="empty-state">No messages found</div>';
                return;
            }

            container.innerHTML = "";
            messages.forEach(msg => {
                const div = document.createElement("div");
                div.className = "message";
                div.innerHTML = `
                    <div class="meta"><span>${msg.username || "Unknown"}</span> · ${new Date(msg.created_at).toLocaleTimeString()}</div>
                    <p>${highlightText(escapeHtml(msg.message_text), escapeHtml(q))}</p>
                `;
                container.appendChild(div);
            });
        } catch (err) {
            console.error("Search error:", err);
        }
    });

    // Send a new message
    async function sendMessage() {
        const input = document.getElementById("messageInput");
        const errorMsg = document.getElementById("errorMsg");
        const text = input.value.trim();

        if (!text) {
            showError("Message cannot be empty");
            return;
        }

        if (!currentRoomId) {
            showError("Please select a room first");
            return;
        }

        errorMsg.style.display = "none";

        try {
            const res = await fetch(`${API}/api/rooms/${currentRoomId}/messages`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ user_id: CURRENT_USER_ID, message_text: text })
            });

            if (!res.ok) {
                showError("Failed to send message");
                return;
            }

            input.value = "";
            await loadMessages(currentRoomId);
        } catch (err) {
            console.error("Send error:", err);
            showError("Could not connect to server");
        }
    }

    // Send message on Enter key
    document.getElementById("messageInput").addEventListener("keydown", function(e) {
        if (e.key === "Enter") sendMessage();
    });

    // Show error message below chat
    function showError(msg) {
        const el = document.getElementById("errorMsg");
        el.textContent = msg;
        el.style.display = "block";
        setTimeout(() => { el.style.display = "none"; }, 3000);
    }

    // Prevent XSS - escape user input before showing in HTML
    function escapeHtml(text) {
        const div = document.createElement("div");
        div.appendChild(document.createTextNode(text));
        return div.innerHTML;
    }

    // Highlight search keyword in message text
    function highlightText(text, keyword) {
        if (!keyword) return text;
        const regex = new RegExp(`(${keyword})`, "gi");
        return text.replace(regex, '<span class="highlight">$1</span>');
    }

    // Init
    loadRooms();
    loadUsers();
</script>

</body>
</html>
